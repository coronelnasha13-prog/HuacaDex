<!DOCTYPE html>
<html>
<head>
    <title>Registro - Huacadex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family:'Poppins',sans-serif;
            background: #d8c3a5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .registro {
            background: #f5ead7;
            width: 350px;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

         h1{
         font-family:'Cinzel',serif;
         color:#6b4226;
          font-size:38px;
         margin-bottom:10px;
        }

        p {
            color: #7a5c3e;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px;
            border: 1px solid #b08968;
            border-radius: 8px;
            background: #fffaf0;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            background: #8b5e34;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #6b4226;
        }

        .logo{
    margin-bottom:20px;
}

.logo img{
    width:120px;
    height:auto;
}
.volver{
    text-decoration:none;
    color:#6b4226;
    font-weight:bold;
}

.volver:hover{
    color:#b07d4f;
}
    </style>
</head>

<body>

<div class="registro">
    <div class="logo">
    <img src="img/logo-huacadex.png" alt="HuacaDex">
</div>
    <h1>Huacadex</h1>
    <p>Crea tu cuenta para descubrir nuestras huacas</p>

    <input type="text" placeholder="Nombre completo">
    <input type="email" placeholder="Correo electrónico">
    <input type="text" placeholder="Institución">
    <input type="password" placeholder="Contraseña">

    <button>Registrarse</button>
    <br><br>

<a href="index.html" class="volver">← Volver al inicio</a>
</div>

</body>
</html>
